<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTemp-AI | Termal Uydu Analiz</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        #map {
            position: absolute;
            top: 0;
            left: 380px;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        #sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 380px;
            height: 100vh;
            background: linear-gradient(180deg, #12141d 0%, #181b27 100%);
            border-right: 1px solid #2a2d3a;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid #2a2d3a;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #00d4ff, #0090ff);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff, #0090ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 12px;
            color: #6b7280;
            margin-left: 48px;
            margin-top: -2px;
        }

        .controls {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2d3a;
        }

        .mode-toggle {
            display: flex;
            background: #1e2030;
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #6b7280;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #00d4ff, #0090ff);
            color: #fff;
            box-shadow: 0 2px 10px rgba(0, 180, 255, 0.3);
        }

        .mode-btn:hover:not(.active) {
            color: #e0e0e0;
            background: #2a2d3a;
        }

        .info-bar {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #6b7280;
            border-bottom: 1px solid #2a2d3a;
        }

        .info-bar .dot {
            width: 6px;
            height: 6px;
            background: #00d4ff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .reports-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .reports-container::-webkit-scrollbar {
            width: 4px;
        }

        .reports-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .reports-container::-webkit-scrollbar-thumb {
            background: #2a2d3a;
            border-radius: 2px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 13px;
            color: #4b5563;
            line-height: 1.5;
        }

        .report-card {
            background: #1e2030;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .report-card h4 {
            font-size: 13px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 4px;
        }

        .report-card .coords {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 12px;
            font-family: monospace;
        }

        .report-card .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .summary-item {
            background: #12141d;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .summary-item .label {
            font-size: 10px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .summary-item .value {
            font-size: 18px;
            font-weight: 700;
            color: #e0e0e0;
        }

        .summary-item .value.hot { color: #ff6b6b; }
        .summary-item .value.cold { color: #00d4ff; }

        .monthly-list {
            list-style: none;
        }

        .monthly-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2d3a;
            font-size: 12px;
        }

        .monthly-list li:last-child {
            border-bottom: none;
        }

        .monthly-list .month {
            color: #9ca3af;
        }

        .monthly-list .temp {
            font-weight: 600;
            font-family: monospace;
        }

        .temp-bar {
            width: 60px;
            height: 4px;
            background: #2a2d3a;
            border-radius: 2px;
            margin-left: 10px;
            overflow: hidden;
        }

        .temp-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .temp-bar-fill.hot { background: linear-gradient(90deg, #ff9a56, #ff6b6b); }
        .temp-bar-fill.warm { background: linear-gradient(90deg, #ffd93d, #ff9a56); }
        .temp-bar-fill.mild { background: linear-gradient(90deg, #6bcb77, #ffd93d); }
        .temp-bar-fill.cool { background: linear-gradient(90deg, #4d96ff, #6bcb77); }
        .temp-bar-fill.cold { background: linear-gradient(90deg, #00d4ff, #4d96ff); }

        .loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 17, 23, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #2a2d3a;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 13px;
            color: #6b7280;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e2030;
            border: 1px solid #2a2d3a;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #e0e0e0;
            z-index: 3000;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .leaflet-container {
            background: #0f1117;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <div class="logo-icon">🌡️</div>
            <span class="logo-text">GeoTemp-AI</span>
        </div>
        <div class="subtitle">Termal Uydu Veri Analiz Sistemi</div>
    </div>

    <div class="controls">
        <div class="mode-toggle">
            <button class="mode-btn active" id="mode-click" onclick="setMode('click')">
                📍 Tek Nokta Seç
            </button>
            <button class="mode-btn" id="mode-rect" onclick="setMode('rect')">
                ⬜ Alan Seç
            </button>
        </div>
    </div>

    <div class="info-bar">
        <span class="dot"></span>
        <span id="status-text">Haritada bir nokta veya alan seçin</span>
    </div>

    <div class="reports-container" id="reports">
        <div class="empty-state" id="empty-state">
            <div class="icon">🛰️</div>
            <h3>Henüz Veri Yok</h3>
            <p>Haritada bir alana tıklayarak<br>termal analiz başlatın</p>
        </div>
    </div>

    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Uydu verileri analiz ediliyor...</div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map;
    let currentMode = 'click';
    let markers = [];
    let rectDraw = null;
    let rectStart = null;
    let tempLayer = null;

    function initMap() {
        map = L.map('map', {
            center: [39.9, 32.8],
            zoom: 6,
            zoomControl: false,
            attributionControl: false
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        L.control.zoom({ position: 'topright' }).addTo(map);

        map.on('click', function(e) {
            if (currentMode === 'click') {
                analyzePoint(e.latlng.lat, e.latlng.lng);
            }
        });

        map.on('mousedown', function(e) {
            if (currentMode === 'rect') {
                rectStart = e.latlng;
                if (rectDraw) map.removeLayer(rectDraw);
            }
        });

        map.on('mouseup', function(e) {
            if (currentMode === 'rect' && rectStart) {
                const bounds = L.latLngBounds(rectStart, e.latlng);
                rectDraw = L.rectangle(bounds, {
                    color: '#00d4ff',
                    weight: 2,
                    fillColor: '#00d4ff',
                    fillOpacity: 0.15,
                    dashArray: '5, 5'
                }).addTo(map);

                const sw = bounds.getSouthWest();
                const ne = bounds.getNorthEast();
                analyzeArea(sw.lat, sw.lng, ne.lat, ne.lng);
                rectStart = null;
            }
        });
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode-' + mode).classList.add('active');

        document.getElementById('status-text').textContent =
            mode === 'click' ? 'Haritada bir nokta seçin' : 'Sürükleyerek bir alan seçin';
    }

    async function analyzePoint(lat, lng) {
        showLoading(true);
        try {
            const res = await fetch('/api/analyze-temperature', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    north: lat + 0.05,
                    south: lat - 0.05,
                    east: lng + 0.05,
                    west: lng - 0.05
                })
            });
            const data = await res.json();
            addMarker(lat, lng);
            addReport(data);
            showToast(`${data.monthly_data.length} aylık veri başarıyla yüklendi`);
        } catch (err) {
            showToast('Hata: Backend bağlantısı kurulamadı');
        }
        showLoading(false);
    }

    async function analyzeArea(north, west, south, east) {
        showLoading(true);
        try {
            const res = await fetch('/api/analyze-temperature', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ north, south, east, west })
            });
            const data = await res.json();
            addReport(data);
            showToast(`${data.monthly_data.length} aylık veri başarıyla yüklendi`);
        } catch (err) {
            showToast('Hata: Backend bağlantısı kurulamadı');
        }
        showLoading(false);
    }

    function addMarker(lat, lng) {
        const marker = L.circleMarker([lat, lng], {
            radius: 6,
            color: '#00d4ff',
            fillColor: '#00d4ff',
            fillOpacity: 0.8,
            weight: 2
        }).addTo(map);
        markers.push(marker);
    }

    function addReport(data) {
        const empty = document.getElementById('empty-state');
        if (empty) empty.remove();

        const container = document.getElementById('reports');
        const temps = data.monthly_data.map(d => d.sicaklik);
        const avg = (temps.reduce((a, b) => a + b, 0) / temps.length).toFixed(1);
        const max = Math.max(...temps).toFixed(1);
        const min = Math.min(...temps).toFixed(1);

        const getTempClass = (t) => {
            if (t >= 30) return 'hot';
            if (t >= 20) return 'warm';
            if (t >= 10) return 'mild';
            if (t >= 0) return 'cool';
            return 'cold';
        };

        const getBarWidth = (t) => {
            return Math.min(100, Math.max(5, ((t + 10) / 50) * 100));
        };

        const monthlyHTML = data.monthly_data.map(d => `
            <li>
                <span class="month">${d.ay}</span>
                <span style="display:flex;align-items:center;">
                    <span class="temp" style="color: ${d.sicaklik >= 25 ? '#ff6b6b' : d.sicaklik >= 10 ? '#ffd93d' : '#00d4ff'}">${d.sicaklik}°C</span>
                    <span class="temp-bar">
                        <span class="temp-bar-fill ${getTempClass(d.sicaklik)}" style="width: ${getBarWidth(d.sicaklik)}%"></span>
                    </span>
                </span>
            </li>
        `).join('');

        const card = document.createElement('div');
        card.className = 'report-card';
        card.innerHTML = `
            <h4>${data.region}</h4>
            <div class="coords">${data.bounds.north.toFixed(4)}N, ${data.bounds.east.toFixed(4)}E</div>
            <div class="summary">
                <div class="summary-item">
                    <div class="label">Ortalama</div>
                    <div class="value">${avg}°</div>
                </div>
                <div class="summary-item">
                    <div class="label">En Sıcak</div>
                    <div class="value hot">${max}°</div>
                </div>
                <div class="summary-item">
                    <div class="label">En Soğuk</div>
                    <div class="value cold">${min}°</div>
                </div>
                <div class="summary-item">
                    <div class="label">Fark</div>
                    <div class="value">${(max - min).toFixed(1)}°</div>
                </div>
            </div>
            <ul class="monthly-list">${monthlyHTML}</ul>
        `;

        container.insertBefore(card, container.firstChild);
        document.getElementById('status-text').textContent = 'Analiz tamamlandı - ' + data.region;
    }

    function showLoading(show) {
        document.getElementById('loading').classList.toggle('show', show);
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    initMap();
</script>
</body>
</html>
